<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="license" content="CC0 1.0 Universal">
  <title>Anniversary</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f8c6d4, #ffe7a3);
      font-family: Arial, sans-serif;
    }
    .center-button {
      padding: 18px 40px;
      border: none;
      border-radius: 30px;
      background-color: #ff5c8a;
      color: white;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .center-button:hover {
      background-color: #ff3f74;
      transform: scale(1.06);
      box-shadow: 0 18px 30px rgba(0,0,0,0.25);
    }
    .center-button {
      transition: transform 200ms ease, box-shadow 200ms ease, background-color 150ms ease;
      will-change: transform, box-shadow;
    }
    .license-note {
      position: fixed;
      left: 12px;
      bottom: 12px;
      background: rgba(255,255,255,0.85);
      color: #333;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      box-shadow: 0 6px 12px rgba(0,0,0,0.08);
    }
    .license-note a { color: #ff5c8a; text-decoration: none; }
  </style>
</head>
<body>
  <button class="center-button">¡A celebrar!</button>
  <div class="license-note">Dominio público (CC0). Para publicar en la web: sube este archivo a un repositorio público y activa GitHub Pages (ej: https://USERNAME.github.io/REPO/). Más info en <a href="https://docs.github.com/en/pages">GitHub Pages</a>.</div>
</body>
</html>
