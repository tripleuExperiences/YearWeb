<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anniversary</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app">
    <div class="celebration-layer" id="celebrationLayer" aria-hidden="true"></div>

    <button class="center-button" id="celebrateButton" type="button">¡A celebrar!</button>

    <section class="heart-stage" id="heartStage" aria-label="Corazón de celebración" aria-hidden="true">
      <div class="heart-grid" id="heartGrid"></div>
    </section>

    <section class="ticker-shell" id="tickerShell" aria-label="Barra de celebración" aria-hidden="true">
      <div class="ticker-track" id="tickerTrack"></div>
    </section>
  </main>
  <script src="code.js" defer></script>
</body>
</html>
