<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anniversary</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #f8c6d4, #ffe7a3);
      font-family: Arial, sans-serif;
    }
    .center-button {
      padding: 18px 40px;
      border: none;
      border-radius: 30px;
      background-color: #ff5c8a;
      color: white;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }
    .center-button:hover {
      background-color: #ff3f74;
      transform: scale(1.06);
      box-shadow: 0 18px 30px rgba(0,0,0,0.25);
    }
    .center-button {
      transition: transform 200ms ease, box-shadow 200ms ease, background-color 150ms ease;
      will-change: transform, box-shadow;
    }
    .license-note a { color: #ff5c8a; text-decoration: none; }
  </style>
</head>
<body>
  <button class="center-button">¡A celebrar!</button>
</body>
</html>
